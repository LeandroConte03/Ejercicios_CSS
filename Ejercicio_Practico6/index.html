<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Box Model</title>
<link rel="stylesheet" href="boxmodel.css">
</head>
<body>
<h1>Explorando el Box Model</h1>
<div class="caja caja1">
Caja 1: width 200px, sin padding ni margin
</div>
<div class="caja caja2">
Caja 2: width 200px, padding 20px, margin 15px
</div>
<div class="caja caja3">
Caja 3: width 200px, padding 20px,
border 5px, margin 15px
</div>
</body>

<!--
1. Cálculo del ancho TOTAL de cada caja 
Caja 1: 200px. No tiene añadidos de padding, border ni margin.
Caja 2: 240px de área visible en pantalla (200px de contenido + 20px padding izquierdo + 20px padding derecho). Si sumamos el espacio de márgenes externos que desplaza a otros elementos, ocupa un total de 270px (240px + 15px margin izquierdo + 15px margin derecho).  
Caja 3: 250px de área visible (200px contenido + 40px padding total + 10px borde total). Sumando sus márgenes externos, ocupa un espacio total en el layout de 280px (250px + 30px margin total)

2. Se debe agregar la propiedad box-sizing: border-box

3. Modificación en Caja 3 y explicación
Qué cambia: Al aplicar border-box a la caja3, el ancho total de la caja en la pantalla se reduce a 200px exactos. El navegador comprime el espacio del contenido interno a 150px para que el padding (40px) y el borde (10px) quepan perfectamente dentro de la medida asignada.
Diferencia : content-box (por defecto) calcula el tamaño final sumando el padding y el borde por fuera del ancho definido. Por el contrario, border-box toma el ancho definido como el límite exterior de la caja visible, restando el padding y el borde hacia adentro.

-->
</html>
