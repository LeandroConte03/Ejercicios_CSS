<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Índice de Ejercicios - CSS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-bottom: 10px;
            color: #2c3e50;
            text-align: center;
        }

        p {
            margin-bottom: 30px;
            color: #7f8c8d;
            text-align: center;
        }

        
        .grid-container {
            display: grid;
            width: 100%;
            max-width: 1000px;
            
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            padding: 10px;
        }

        
        .card-ejercicio {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            color: #34495e;
            text-decoration: none;
            padding: 25px 15px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1.1rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
            border: 1px solid #e2e8f0;
        }

        
        .card-ejercicio:hover {
            background-color: #3498db;
            color: #ffffff;
            transform: translateY(-4px);
            box-shadow: 0 8px 15px rgba(52, 152, 219, 0.3);
            border-color: #3498db;
        }
    </style>
</head>
<body>

    <h1>Panel de Ejercicios CSS Grid</h1>
    <p>Selecciona un ejercicio para ver su resolución</p>

    <div class="grid-container">
        <a href="Ejercicio_Practico1/index.html" class="card-ejercicio">Ejercicio 1</a>
        <a href="Ejercicio_Practico2/index.html" class="card-ejercicio">Ejercicio 2</a>
        <a href="Ejercicio_Practico3/index.html" class="card-ejercicio">Ejercicio 3</a>
        <a href="Ejercicio_Practico4/index.html" class="card-ejercicio">Ejercicio 4</a>
        <a href="Ejercicio_Practico5/index.html" class="card-ejercicio">Ejercicio 5</a>
        <a href="Ejercicio_Practico6/index.html" class="card-ejercicio">Ejercicio 6</a>
        <a href="Ejercicio_Integrador/index.html" class="card-ejercicio">Ejercicio 7</a>
        
    </div>

</body>
</html>
